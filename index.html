<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="text/javascript">
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                try {
                    navigator.serviceWorker.register('sw.js');
                    console.log("Service Worker registered successfully!")
                } catch (e) {
                    console.error(e)
                }
            });
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }

        main.container {
            max-width: 760px;
            padding-block: 2rem;
        }

        .page-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .page-header hgroup { margin-bottom: 0; }
        .page-header button { margin-bottom: 0; width: auto; }

        article header { margin-bottom: 1rem; }

        .counter {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .counter button { margin-bottom: 0; }

        .counter .count {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 2.5rem;
            text-align: center;
        }

        .echo p {
            margin-bottom: 0;
            min-height: 1.5rem;
            color: var(--pico-muted-color);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .status-badge .dot {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 50%;
            background: var(--pico-del-color);
        }

        .status-badge[data-online="true"] .dot { background: #2e7d32; }

        .orientation .readout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .orientation .axis {
            text-align: center;
            padding: 1rem 0.5rem;
            border-radius: var(--pico-border-radius);
            background: var(--pico-card-sectioning-background-color);
        }

        .orientation .axis .label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--pico-muted-color);
        }

        .orientation .axis .value {
            display: block;
            font-size: 1.75rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .orientation .stage {
            height: 8rem;
            border-radius: var(--pico-border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.75);
            transition: background-color 0.1s linear;
        }
    </style>
</head>

<body
    x-data="{
        deferredPrompt: null,
        canInstall: false,
        async install() {
            if (!this.deferredPrompt) return;
            this.deferredPrompt.prompt();
            const { outcome } = await this.deferredPrompt.userChoice;
            console.log('Install outcome:', outcome);
            this.deferredPrompt = null;
            this.canInstall = false;
        }
    }"
    @beforeinstallprompt.window="
        $event.preventDefault();
        deferredPrompt = $event;
        canInstall = true;
    "
    @appinstalled.window="canInstall = false; deferredPrompt = null;"
>
    <main class="container">
        <header class="page-header">
            <hgroup>
                <h1>Medienapplikationen Übung</h1>
                <p>A small progressive web app playground.</p>
            </hgroup>
            <button x-cloak x-show="canInstall" @click="install()">Install app</button>
        </header>

        <article>
            <header><strong>Counter</strong></header>
            <div class="counter" x-data="{ count: 0 }">
                <button class="outline" x-on:click="count--">−</button>
                <span class="count" x-text="count"></span>
                <button x-on:click="count++">+</button>
            </div>
        </article>

        <article class="echo" x-data="{ message: '' }">
            <header><strong>Echo</strong></header>
            <input type="text" x-model="message" placeholder="Type something…">
            <p x-text="message || 'Your text appears here.'"></p>
        </article>

        <article>
            <header><strong>Connection status</strong></header>
            <span class="status-badge"
                x-data="{ status: navigator.onLine }"
                :data-online="status"
                @offline.window="status=false"
                @online.window="status=true">
                <span class="dot"></span>
                <span x-text="status ? 'Online' : 'Offline'"></span>
            </span>
        </article>

        <article class="orientation"
            x-data="{
                alpha: 0,
                beta: 0,
                gamma: 0,
                supported: 'DeviceOrientationEvent' in window,
                needsPermission: typeof DeviceOrientationEvent !== 'undefined'
                    && typeof DeviceOrientationEvent.requestPermission === 'function',
                listening: false,
                handle(event) {
                    this.alpha = event.alpha ?? 0;
                    this.beta = event.beta ?? 0;
                    this.gamma = event.gamma ?? 0;
                },
                start() {
                    window.addEventListener('deviceorientation', (e) => this.handle(e));
                    this.listening = true;
                },
                async enable() {
                    if (this.needsPermission) {
                        try {
                            const result = await DeviceOrientationEvent.requestPermission();
                            if (result !== 'granted') return;
                        } catch (e) {
                            console.error(e);
                            return;
                        }
                    }
                    this.start();
                },
                get background() {
                    // alpha 0–360 → red, beta -180–180 → green, gamma -90–90 → blue
                    const r = Math.round((this.alpha / 360) * 255);
                    const g = Math.round(((this.beta + 180) / 360) * 255);
                    const b = Math.round(((this.gamma + 90) / 180) * 255);
                    return `rgb(${r}, ${g}, ${b})`;
                }
            }"
            x-init="if (!needsPermission) start()"
        >
            <header><strong>Device orientation</strong></header>

            <template x-if="!supported">
                <p>Your device or browser does not support the orientation sensor.</p>
            </template>

            <template x-if="supported">
                <div>
                    <button x-cloak x-show="needsPermission && !listening" @click="enable()">
                        Enable orientation sensor
                    </button>

                    <div class="readout">
                        <div class="axis">
                            <span class="label">Alpha (z)</span>
                            <span class="value" x-text="alpha.toFixed(1) + '°'"></span>
                        </div>
                        <div class="axis">
                            <span class="label">Beta (x)</span>
                            <span class="value" x-text="beta.toFixed(1) + '°'"></span>
                        </div>
                        <div class="axis">
                            <span class="label">Gamma (y)</span>
                            <span class="value" x-text="gamma.toFixed(1) + '°'"></span>
                        </div>
                    </div>

                    <div class="stage" :style="`background-color: ${background}`">
                        <span x-text="background"></span>
                    </div>
                </div>
            </template>
        </article>
    </main>
</body>

</html

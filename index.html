<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="text/javascript">
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                try {
                    navigator.serviceWorker.register('sw.js');
                    console.log("Service Worker registered successfully!")
                } catch (e) {
                    console.error(e)
                }
            });
        }
    </script>
</head>

<body
    x-data="{
        deferredPrompt: null,
        canInstall: false,
        async install() {
            if (!this.deferredPrompt) return;
            this.deferredPrompt.prompt();
            const { outcome } = await this.deferredPrompt.userChoice;
            console.log('Install outcome:', outcome);
            this.deferredPrompt = null;
            this.canInstall = false;
        }
    }"
    @beforeinstallprompt.window="
        $event.preventDefault();
        deferredPrompt = $event;
        canInstall = true;
    "
    @appinstalled.window="canInstall = false; deferredPrompt = null;"
>
    <main class="container">
        <header class="page-header">
            <hgroup>
                <h1>Medienapplikationen Übung</h1>
                <p>A small progressive web app playground.</p>
            </hgroup>
            <button x-cloak x-show="canInstall" @click="install()">Install app</button>
        </header>

        <article class="shared"
            x-data="{
                title: '',
                text: '',
                url: '',
                files: [],
                get hasContent() {
                    return this.title || this.text || this.url || this.files.length;
                },
                read() {
                    const params = new URLSearchParams(window.location.search);
                    this.title = params.get('title') || '';
                    this.text = params.get('text') || '';
                    this.url = params.get('url') || '';
                    this.readFiles(parseInt(params.get('files') || '0', 10));
                },
                async readFiles(count) {
                    if (!count || !('caches' in window)) return;
                    const cache = await caches.open('tpwa-shared-files');
                    for (let i = 0; i < count; i++) {
                        const response = await cache.match('./shared-file-' + i);
                        if (!response) continue;
                        const blob = await response.blob();
                        const name = decodeURIComponent(response.headers.get('X-Shared-File-Name') || ('file-' + i));
                        this.files.push({
                            name,
                            size: blob.size,
                            isImage: blob.type.startsWith('image/'),
                            objectUrl: URL.createObjectURL(blob)
                        });
                    }
                },
                formatSize(bytes) {
                    if (bytes < 1024) return bytes + ' B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
                },
                async clear() {
                    this.title = '';
                    this.text = '';
                    this.url = '';
                    this.files.forEach((file) => URL.revokeObjectURL(file.objectUrl));
                    this.files = [];
                    if ('caches' in window) await caches.delete('tpwa-shared-files');
                    history.replaceState(null, '', window.location.pathname);
                }
            }"
            x-init="read()"
            x-cloak
            x-show="hasContent"
        >
            <header><strong>Shared with this app</strong></header>

            <template x-if="title">
                <div class="shared-field">
                    <span class="label">Title</span>
                    <p x-text="title"></p>
                </div>
            </template>

            <template x-if="text">
                <div class="shared-field">
                    <span class="label">Text</span>
                    <p x-text="text"></p>
                </div>
            </template>

            <template x-if="url">
                <div class="shared-field">
                    <span class="label">Link</span>
                    <p><a :href="url" target="_blank" rel="noopener noreferrer" x-text="url"></a></p>
                </div>
            </template>

            <template x-if="files.length">
                <div class="shared-field">
                    <span class="label">Files</span>
                    <div class="shared-files">
                        <template x-for="(file, index) in files" :key="index">
                            <div class="shared-file">
                                <template x-if="file.isImage">
                                    <img :src="file.objectUrl" :alt="file.name">
                                </template>
                                <div class="shared-file-meta">
                                    <a :href="file.objectUrl" :download="file.name" x-text="file.name"></a>
                                    <span class="shared-file-size" x-text="formatSize(file.size)"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <div class="actions">
                <button class="outline" @click="clear()">Clear</button>
            </div>
        </article>

        <article>
            <header><strong>Counter</strong></header>
            <div class="counter" x-data="{ count: 0 }">
                <button class="outline" x-on:click="count--">−</button>
                <span class="count" x-text="count"></span>
                <button x-on:click="count++">+</button>
            </div>
        </article>

        <article class="echo" x-data="{ message: '' }">
            <header><strong>Echo</strong></header>
            <input type="text" x-model="message" placeholder="Type something…">
            <p x-text="message || 'Your text appears here.'"></p>
        </article>

        <article>
            <header><strong>Connection status</strong></header>
            <span class="status-badge"
                x-data="{ status: navigator.onLine }"
                :data-online="status"
                @offline.window="status=false"
                @online.window="status=true">
                <span class="dot"></span>
                <span x-text="status ? 'Online' : 'Offline'"></span>
            </span>
        </article>

        <article class="orientation"
            x-data="{
                alpha: 0,
                beta: 0,
                gamma: 0,
                supported: 'DeviceOrientationEvent' in window,
                needsPermission: typeof DeviceOrientationEvent !== 'undefined'
                    && typeof DeviceOrientationEvent.requestPermission === 'function',
                listening: false,
                handle(event) {
                    this.alpha = event.alpha ?? 0;
                    this.beta = event.beta ?? 0;
                    this.gamma = event.gamma ?? 0;
                },
                start() {
                    window.addEventListener('deviceorientation', (e) => this.handle(e));
                    this.listening = true;
                },
                async enable() {
                    if (this.needsPermission) {
                        try {
                            const result = await DeviceOrientationEvent.requestPermission();
                            if (result !== 'granted') return;
                        } catch (e) {
                            console.error(e);
                            return;
                        }
                    }
                    this.start();
                },
                get background() {
                    // alpha 0–360 → red, beta -180–180 → green, gamma -90–90 → blue
                    const r = Math.round((this.alpha / 360) * 255);
                    const g = Math.round(((this.beta + 180) / 360) * 255);
                    const b = Math.round(((this.gamma + 90) / 180) * 255);
                    return `rgb(${r}, ${g}, ${b})`;
                }
            }"
            x-init="if (!needsPermission) start()"
        >
            <header><strong>Device orientation</strong></header>

            <template x-if="!supported">
                <p>Your device or browser does not support the orientation sensor.</p>
            </template>

            <template x-if="supported">
                <div>
                    <button x-cloak x-show="needsPermission && !listening" @click="enable()">
                        Enable orientation sensor
                    </button>

                    <div class="readout">
                        <div class="axis">
                            <span class="label">Alpha (z)</span>
                            <span class="value" x-text="alpha.toFixed(1) + '°'"></span>
                        </div>
                        <div class="axis">
                            <span class="label">Beta (x)</span>
                            <span class="value" x-text="beta.toFixed(1) + '°'"></span>
                        </div>
                        <div class="axis">
                            <span class="label">Gamma (y)</span>
                            <span class="value" x-text="gamma.toFixed(1) + '°'"></span>
                        </div>
                    </div>

                    <div class="stage" :style="`background-color: ${background}`">
                        <span x-text="background"></span>
                    </div>
                </div>
            </template>
        </article>

        <article class="geolocation"
            x-data="{
                supported: 'geolocation' in navigator,
                loading: false,
                latitude: null,
                longitude: null,
                error: '',
                get hasPosition() {
                    return this.latitude !== null && this.longitude !== null;
                },
                get mapLink() {
                    if (!this.hasPosition) return '#';
                    return `https://www.openstreetmap.org/?mlat=${this.latitude}&mlon=${this.longitude}#map=16/${this.latitude}/${this.longitude}`;
                },
                locate() {
                    this.error = '';
                    this.loading = true;
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            this.latitude = position.coords.latitude;
                            this.longitude = position.coords.longitude;
                            this.loading = false;
                        },
                        (err) => {
                            this.loading = false;
                            if (err.code === err.PERMISSION_DENIED) {
                                this.error = 'Permission to access your location was denied.';
                            } else if (err.code === err.POSITION_UNAVAILABLE) {
                                this.error = 'Your location is currently unavailable.';
                            } else if (err.code === err.TIMEOUT) {
                                this.error = 'The request to get your location timed out.';
                            } else {
                                this.error = 'An unknown error occurred while getting your location.';
                            }
                        }
                    );
                }
            }"
        >
            <header><strong>Geolocation</strong></header>

            <template x-if="!supported">
                <p>Your device or browser does not support geolocation.</p>
            </template>

            <template x-if="supported">
                <div>
                    <div class="actions">
                        <button @click="locate()" :aria-busy="loading" :disabled="loading">
                            <span x-text="loading ? 'Locating…' : 'Get my location'"></span>
                        </button>
                        <a x-show="hasPosition" :href="mapLink" target="_blank" rel="noopener noreferrer" role="button" class="outline">
                            View on OpenStreetMap
                        </a>
                    </div>

                    <template x-if="error">
                        <p style="color: var(--pico-del-color); margin-top: 1rem;" x-text="error"></p>
                    </template>

                    <template x-if="hasPosition">
                        <div class="readout two-up" style="margin-top: 1rem;">
                            <div class="axis">
                                <span class="label">Latitude</span>
                                <span class="value" x-text="latitude.toFixed(5)"></span>
                            </div>
                            <div class="axis">
                                <span class="label">Longitude</span>
                                <span class="value" x-text="longitude.toFixed(5)"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </article>

        <article class="share"
            x-data="{
                copied: false,
                error: '',
                async share() {
                    this.error = '';
                    const data = {
                        title: 'Medienapplikationen Übung',
                        text: 'Check out this progressive web app playground.',
                        url: window.location.href
                    };
                    if (navigator.share) {
                        try {
                            await navigator.share(data);
                        } catch (err) {
                            // AbortError = user cancelled the share sheet, not a real error
                            if (err.name !== 'AbortError') {
                                this.error = 'Sharing failed. Please try again.';
                            }
                        }
                    } else {
                        try {
                            await navigator.clipboard.writeText(window.location.href);
                            this.copied = true;
                            setTimeout(() => this.copied = false, 2000);
                        } catch (err) {
                            this.error = 'Could not copy the link to your clipboard.';
                        }
                    }
                }
            }"
        >
            <header><strong>Share</strong></header>
            <div class="actions">
                <button @click="share()">Share this page</button>
                <span x-cloak x-show="copied" x-transition class="copied-info">Link copied</span>
            </div>
            <template x-if="error">
                <p style="color: var(--pico-del-color); margin-top: 1rem;" x-text="error"></p>
            </template>
        </article>
    </main>
</body>

</html
